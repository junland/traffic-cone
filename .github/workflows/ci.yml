name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.25"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Verify dependencies
        run: go mod tidy

      - name: Run tests
        run: go test ./...

  build:
    name: Build (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.25"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Build all packages
        run: go build ./...

      - name: Build CLI binary
        run: go build -o bin/traffic-cone ./cmd/traffic-cone

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: traffic-cone-binaries-go${{ matrix.go-version }}
          path: bin/
          retention-days: 7
