name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: Verify dependencies
        run: go mod tidy

      - name: Run tests
        run: go test ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: Build all packages
        run: go build ./...

      - name: Build CLI binary
        run: go build -o bin/traffic-cone ./cmd/traffic-cone

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: traffic-cone-binaries
          path: bin/
          retention-days: 7
